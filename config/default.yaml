# Pac-Man AI Simulator Configuration

seed: 42

# Game engine
game:
  lives: 3
  max_steps_per_episode: 3000
  frightened_duration: 36  # ticks (6 seconds at 6 ticks/sec)
  fruit_spawn_pellets: [70, 170]
  fruit_score: 100
  fruit_duration: 60  # ticks

  # Scatter/Chase mode schedule (in ticks, 6 ticks/sec)
  # [scatter, chase, scatter, chase, scatter, chase, scatter, chase_forever]
  mode_schedule: [42, 120, 42, 120, 30, 120, 30, -1]

  # Ghost house exit pellet thresholds (Blinky starts outside)
  ghost_exit_pellets: [0, 30, 60, 80]

# DQN agent hyperparameters
agent:
  learning_rate: 0.0003
  batch_size: 64
  gamma: 0.95
  epsilon_start: 1.0
  epsilon_end: 0.15
  epsilon_decay_episodes: 800
  replay_buffer_size: 100000
  target_update_tau: 0.005
  min_replay_before_learn: 1000
  learn_every_n_steps: 8
  gradient_clip_norm: 1.0
  hidden_sizes: [256, 128, 64]

# Reward values
rewards:
  pacman:
    eat_pellet: 3.0
    eat_power_pellet: 5.0
    eat_ghost: 10.0
    eat_fruit: 5.0
    clear_level: 50.0
    caught_by_ghost: -5.0
    game_over: -10.0
    time_step: -0.05

  ghost:
    catch_pacman_self: 10.0
    catch_pacman_team: 3.0
    game_over_win: 15.0
    pacman_eats_pellet: -0.5
    pacman_clears_level: -15.0
    got_eaten: -5.0
    proximity_scale: 0.1

# Training
training:
  num_episodes: 5000
  checkpoint_every: 100
  log_every: 10
  eval_every: 200
  eval_episodes: 20

# GUI
gui:
  tile_size: 20
  fps_watch: 10
  fps_fast: 0  # uncapped
  window_width: 760  # 28 * 20 + 200 sidebar
  window_height: 620  # 31 * 20

# Data
data:
  save_replay_buffer: false  # large, skip by default
  event_log: false  # per-step JSONL logging
