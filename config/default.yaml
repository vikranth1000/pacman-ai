# Pac-Man AI Simulator Configuration

seed: 42

# Game engine
game:
  lives: 3
  max_steps_per_episode: 3000
  frightened_duration: 36  # ticks (6 seconds at 6 ticks/sec)
  fruit_spawn_pellets: [70, 170]
  fruit_score: 100
  fruit_duration: 60  # ticks

  # Scatter/Chase mode schedule (in ticks, 6 ticks/sec)
  mode_schedule: [42, 120, 42, 120, 30, 120, 30, -1]

  # Ghost house exit pellet thresholds (Blinky starts outside)
  ghost_exit_pellets: [0, 30, 60, 80]

# DQN/PPO agent hyperparameters
agent:
  algorithm: ppo  # "dqn" or "ppo"
  learning_rate: 0.0003
  batch_size: 128
  gamma: 0.95
  epsilon_start: 1.0
  epsilon_end: 0.08
  epsilon_decay_episodes: 2000
  replay_buffer_size: 200000
  target_update_tau: 0.005
  min_replay_before_learn: 2000
  learn_every_n_steps: 4
  gradient_clip_norm: 1.0
  hidden_sizes: [256, 256, 128]

  # Prioritized Experience Replay (DQN only)
  use_prioritized_replay: true
  per_alpha: 0.6
  per_beta_start: 0.4
  per_beta_end: 1.0
  per_beta_anneal_episodes: 2500

  # PPO-specific
  ppo_clip_epsilon: 0.2
  ppo_epochs: 4
  ppo_minibatch_size: 64
  ppo_value_loss_coef: 0.5
  ppo_entropy_coef: 0.01
  ppo_gae_lambda: 0.95
  ppo_max_grad_norm: 0.5

# Curriculum learning — asymmetric ghost/pacman training
curriculum:
  enabled: true
  ghost_epsilon_start: 1.0
  ghost_epsilon_end: 0.12
  ghost_epsilon_decay_episodes: 3000
  ghost_lr_multiplier_start: 0.3
  ghost_lr_multiplier_end: 1.0
  ghost_lr_ramp_episodes: 2000
  pacman_head_start_episodes: 300

# Reward values
rewards:
  pacman:
    eat_pellet: 5.0
    eat_power_pellet: 10.0
    eat_ghost: 20.0
    eat_fruit: 8.0
    clear_level: 100.0
    caught_by_ghost: -10.0
    game_over: -20.0
    time_step: -0.05
    pellet_proximity_scale: 0.1
    new_tile_bonus: 0.1
    revisit_penalty: 0.3

  ghost:
    catch_pacman_self: 15.0
    catch_pacman_team: 5.0
    game_over_win: 20.0
    pacman_eats_pellet: -0.5
    pacman_clears_level: -20.0
    got_eaten: -8.0
    proximity_scale: 0.15

# Training
training:
  num_episodes: 3000
  checkpoint_every: 100
  log_every: 10
  eval_every: 200
  eval_episodes: 20

# GUI
gui:
  tile_size: 20
  fps_watch: 10
  fps_fast: 0  # uncapped
  window_width: 760  # 28 * 20 + 200 sidebar
  window_height: 620  # 31 * 20

# Data
data:
  save_replay_buffer: false  # large, skip by default
  event_log: false  # per-step JSONL logging
